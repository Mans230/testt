<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>أسعار خدمات RDP</title>
</head>
<body>
    <header>
        <h1>أسعار خدمات RDP</h1>
    </header>
    <main>
        <section id="pricing">
            <h2>الباقات والأسعار</h2>
            <div class="pricing-card">
                <h3>الباقة الأساسية</h3>
                <p>السعر: 50 دولار في الشهر</p>
                <button>احصل على هذه الباقة</button>
            </div>
            <div class="pricing-card">
                <h3>الباقة المتقدمة</h3>
                <p>السعر: 100 دولار في الشهر</p>
                <button>احصل على هذه الباقة</button>
            </div>
        </section>
        <section id="faq">
            <h2>الأسئلة الشائعة</h2>
            <div class="faq-item">
                <h3>كيف يمكنني الاشتراك؟</h3>
                <p>يمكنك الاشتراك عن طريق الضغط على زر الاشتراك أسفل كل باقة.</p>
            </div>
            <div class="faq-item">
                <h3>هل يمكنني تغيير الباقة لاحقًا؟</h3>
                <p>نعم، يمكنك تغيير باقتك في أي وقت.</p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
