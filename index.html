<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>
    <style>
        .currency-toggle {
            margin: 10px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <button class="currency-toggle" id="toggleCurrency">Switch to EGP</button>
    </nav>
    <div id="pricing">
        <h2>Pricing Plans</h2>
        <div id="silver">
            <h3>Silver: <span class="price" data-usd="10" data-egp="500">$10</span></h3>
        </div>
        <div id="silverPlus">
            <h3>Silver+: <span class="price" data-usd="13" data-egp="650">$13</span></h3>
        </div>
        <div id="gold">
            <h3>Gold: <span class="price" data-usd="20" data-egp="1000">$20</span></h3>
        </div>
        <div id="platinum">
            <h3>Platinum: <span class="price" data-usd="30" data-egp="1500">$30</span></h3>
        </div>
    </div>
    <script>
        document.getElementById('toggleCurrency').addEventListener('click', function() {
            const prices = document.querySelectorAll('.price');
            const currentCurrency = this.innerText.includes('EGP') ? 'EGP' : 'USD';
            prices.forEach(price => {
                const usd = price.getAttribute('data-usd');
                const egp = price.getAttribute('data-egp');
                price.innerText = currentCurrency === 'EGP' ? `\${egp}` : `\$${usd}`;
            });
            this.innerText = currentCurrency === 'EGP' ? 'Switch to USD' : 'Switch to EGP';
        });
    </script>
</body>
</html>
