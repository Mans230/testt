<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الأسئلة الشائعة | RDP.cheap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4fa; --card: #fff; --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
      --blue: #2563eb; --blue2: #1d4ed8; --green: #22c55e; --orange: #f97316; --red: #ef4444;
      --chip: #eef2f7; --gradient: linear-gradient(135deg,#2563eb,#7c3aed);
      --shadow: 0 8px 28px rgba(15,23,42,.07); --radius: 18px;
    }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Cairo',system-ui,Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 16px; }

    /* NAV */
    .nav {
      position: sticky; top: 8px; z-index: 50;
      margin: 10px 16px 0;
      background: rgba(255,255,255,.96); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(226,232,240,.7); border-radius: 999px;
      padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
      box-shadow: 0 4px 20px rgba(2,6,23,.06);
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 15px; }
    .logo {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 9px;
      background: var(--gradient); box-shadow: 0 6px 16px rgba(37,99,235,.3);
      position: relative; animation: logoPulse 3s ease-in-out infinite;
    }
    .logo::after { content:""; position:absolute; inset:7px; border-radius:6px; background:rgba(255,255,255,.25); }
    @keyframes logoPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    .brand b { background: var(--gradient); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a { padding: 7px 10px; border-radius: 999px; font-size: 13px; font-weight: 700; color: var(--muted); transition: .2s; }
    .nav-links a:hover { background: #f1f5f9; color: var(--text); }
    .nav-links a.active { background: var(--gradient); color: #fff; }
    .nav-btn { border: 1.5px solid var(--border); background: #fff; padding: 8px 14px; border-radius: 999px; font-weight: 800; font-size: 13px; cursor: pointer; font-family: 'Cairo',system-ui; transition: .2s; white-space: nowrap; }
    .nav-btn:hover { background: #f8fafc; }
    .nav-btn.primary { background: var(--gradient); color: #fff; border-color: transparent; box-shadow: 0 6px 18px rgba(37,99,235,.25); }
    .nav-btn.primary:hover { filter: brightness(1.08); }

    /* HEADER */
    .hero { text-align: center; padding: 40px 16px 24px; position: relative; }
    .hero::before { content:""; position:absolute; inset:0; background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(37,99,235,.09) 0%,transparent 70%); pointer-events:none; z-index:0; }
    .hero > * { position: relative; z-index: 1; }
    .hero-icon {
      width: 80px; height: 80px; border-radius: 22px;
      background: var(--gradient); margin: 0 auto 18px;
      display: grid; place-items: center;
      box-shadow: 0 12px 32px rgba(37,99,235,.25);
      font-size: 36px;
    }
    .hero-title {
      font-size: clamp(28px,6vw,44px); font-weight: 900; line-height: 1.2; letter-spacing: -.5px;
      background: var(--gradient); -webkit-background-clip:text; background-clip:text; color:transparent;
      margin-bottom: 12px; animation: fadeUp .5s ease-out .1s both;
    }
    .hero-sub {
      font-size: clamp(13px,2.5vw,16px); color: var(--muted); font-weight: 600; line-height: 1.8;
      max-width: 600px; margin: 0 auto 24px; padding: 0 4px; animation: fadeUp .5s ease-out .2s both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* SEARCH */
    .search-box {
      max-width: 500px; margin: 0 auto 28px;
      position: relative; animation: fadeUp .5s ease-out .25s both;
    }
    .search-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 999px;
      padding: 14px 20px 14px 50px; background: #fff; font-weight: 700; font-size: 14px;
      font-family: 'Cairo',system-ui; outline: none; transition: .2s;
      box-shadow: 0 4px 16px rgba(2,6,23,.05);
    }
    .search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(37,99,235,.12); }
    .search-icon {
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
      font-size: 18px; color: var(--muted);
    }

    /* CATEGORIES */
    .categories {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 24px; animation: fadeUp .5s ease-out .3s both;
    }
    .cat-btn {
      padding: 8px 18px; border-radius: 999px; border: 1.5px solid var(--border);
      background: #fff; font-weight: 800; font-size: 13px; cursor: pointer;
      font-family: 'Cairo',system-ui; transition: .2s;
    }
    .cat-btn:hover { border-color: var(--blue); color: var(--blue); }
    .cat-btn.active { background: var(--gradient); color: #fff; border-color: transparent; }

    /* FAQ GRID */
    .faq-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(340px,1fr)); gap: 16px; padding-bottom: 40px; }
    .faq-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; animation: fadeUp .5s ease-out backwards;
    }
    .faq-header {
      padding: 16px 18px; display: flex; align-items: center; gap: 12px;
      background: #f8fafc; border-bottom: 1px solid var(--border);
    }
    .faq-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(37,99,235,.1); display: grid; place-items: center; font-size: 18px;
    }
    .faq-cat-title { font-weight: 900; font-size: 15px; }
    .faq-list { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
    .faq-item {
      padding: 14px 16px; border-radius: 12px; background: #f8fafc;
      border: 1px solid rgba(226,232,240,.8); cursor: pointer; transition: .15s;
    }
    .faq-item:hover { background: #f1f5f9; }
    .faq-q {
      font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .faq-toggle { color: var(--blue); font-weight: 900; font-size: 20px; flex-shrink: 0; transition: .2s; }
    .faq-item.open .faq-toggle { transform: rotate(45deg); }
    .faq-a {
      display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
      color: var(--muted); font-size: 13px; font-weight: 700; line-height: 1.7;
    }
    .faq-item.open .faq-a { display: block; }

    /* CONTACT BOX */
    .contact-box {
      background: linear-gradient(135deg,#eff6ff,#dbeafe);
      border: 1px solid rgba(37,99,235,.18); border-radius: 22px;
      padding: clamp(24px,4vw,36px); text-align: center; margin-bottom: 30px;
    }
    .contact-title { font-size: clamp(20px,3vw,26px); font-weight: 900; margin-bottom: 10px; }
    .contact-desc { color: var(--muted); font-weight: 700; font-size: 14px; margin-bottom: 20px; }
    .contact-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .contact-btn {
      padding: 12px 24px; border-radius: 999px; font-weight: 800; font-size: 14px;
      cursor: pointer; font-family: 'Cairo',system-ui; transition: .2s; text-decoration: none;
    }
    .contact-btn.primary { background: var(--gradient); color: #fff; border: none; box-shadow: 0 8px 20px rgba(37,99,235,.22); }
    .contact-btn.primary:hover { filter: brightness(1.08); transform: translateY(-2px); }
    .contact-btn.secondary { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
    .contact-btn.secondary:hover { border-color: var(--blue); color: var(--blue); }

    /* FOOTER */
    footer { padding: 20px 0 36px; }
    .foot { border-top:1px solid rgba(226,232,240,.8); padding-top:18px; display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center; font-size:12px; font-weight:700; color:var(--muted); }
    .foot a:hover { color: var(--blue); }
    .foot-links { display:flex; gap:14px; flex-wrap:wrap; }
    .social-row { display:flex; gap:8px; }
    .social-btn { width:34px; height:34px; border-radius:50%; background:#f1f5f9; display:grid; place-items:center; font-size:15px; transition:.2s; }
    .social-btn:hover { background:var(--gradient); color:#fff; transform:translateY(-2px); }

    /* RESPONSIVE */
    @media (max-width:900px) {
      .nav-links { display: none; }
      .faq-grid { grid-template-columns: 1fr; }
    }
    @media (max-width:600px) {
      .nav { margin: 8px 8px 0; padding: 8px 12px; }
      .hero-icon { width: 60px; height: 60px; font-size: 28px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <nav class="nav">
      <a class="brand" href="index.html">
        <span class="logo"></span>
        <span>RDP<b>.cheap</b></span>
      </a>
      <div class="nav-links">
        <a href="index.html">الخطط</a>
        <a href="support.html">الدعم</a>
        <a href="faq.html" class="active">الأسئلة الشائعة</a>
        <a href="tos.html">الشروط</a>
      </div>
      <div class="actions">
        <a class="nav-btn" href="admin.html" title="لوحة التحكم">🎛️</a>
        <a class="nav-btn primary" href="support.html">تواصل معنا</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-icon">❓</div>
      <h1 class="hero-title">الأسئلة الشائعة</h1>
      <p class="hero-sub">إجابات سريعة لأشهر الأسئلة. لو مش لقيت سؤالك، تواصل معنا مباشرة.</p>
    </section>

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="ابحث عن سؤالك..." id="faqSearch" oninput="filterFAQs()" />
    </div>

    <div class="categories">
      <button class="cat-btn active" onclick="showCategory('all',this)">الكل</button>
      <button class="cat-btn" onclick="showCategory('general',this)">عام</button>
      <button class="cat-btn" onclick="showCategory('billing',this)">الفوترة</button>
      <button class="cat-btn" onclick="showCategory('technical',this)">تقني</button>
      <button class="cat-btn" onclick="showCategory('security',this)">الأمان</button>
    </div>

    <div class="faq-grid" id="faqGrid"></div>

    <div class="contact-box">
      <h2 class="contact-title">مفتكرش سؤالك؟</h2>
      <p class="contact-desc">تواصل معانا مباشرة وهنجاوبك في أسرع وقت</p>
      <div class="contact-btns">
        <a href="https://t.me/hostrdp" target="_blank" class="contact-btn primary">💬 تواصل عبر Telegram</a>
        <a href="support.html" class="contact-btn secondary">📝 أرسل تذكرة</a>
      </div>
    </div>

    <footer>
      <div class="wrap">
        <div class="foot">
          <div>© 2026 RDP.cheap - جميع الحقوق محفوظة</div>
          <div class="foot-links">
            <a href="index.html">الخطط</a>
            <a href="support.html">الدعم</a>
            <a href="tos.html">الشروط</a>
          </div>
          <div class="social-row">
            <a href="https://t.me/hostrdp" class="social-btn" target="_blank" title="Telegram">📨</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // Load FAQs from localStorage
    const faqs = JSON.parse(localStorage.getItem('rdp_faqs')) || [
      {id:1, category:'general', question:'What is RDP?', question_ar:'إيه هو RDP؟', answer:'RDP = Remote Desktop Protocol.', answer_ar:'بروتوكول سطح المكتب عن بُعد.', active:true},
      {id:2, category:'general', question:'How long does activation take?', question_ar:'التفعيل بياخد وقت قد إيه؟', answer:'Usually instant or within minutes.', answer_ar:'غالباً فوري أو خلال دقائق.', active:true},
      {id:3, category:'billing', question:'What payment methods?', question_ar:'أيه طرق الدفع؟', answer:'Fawry, Vodafone Cash, Bank transfer.', answer_ar:'فوري، فودافون كاش، تحويل بنكي.', active:true},
      {id:4, category:'billing', question:'What is the refund policy?', question_ar:'أيه سياسة الاسترجاع؟', answer:'Full refund within 24h if issue on our side.', answer_ar:'استرجاع كامل خلال 24 ساعة لو المشكلة من عندنا.', active:true},
      {id:5, category:'technical', question:'How do I change the password?', question_ar:'إزاي أغير الباسورد؟', answer:'Full Root/Admin privileges.', answer_ar:'عندك صلاحيات Root/Administrator كاملة.', active:true},
      {id:6, category:'technical', question:'Can I install additional software?', question_ar:'أقدر أثبت برامج إضافية؟', answer:'Yes, full privileges.', answer_ar:'أيوه! عندك صلاحيات كاملة.', active:true},
      {id:7, category:'security', question:'What type of IP is available?', question_ar:'أيه نوع الـ IP المتاح؟', answer:'Dedicated static IPv4.', answer_ar:'Dedicated IPv4 ثابت.', active:true},
      {id:8, category:'security', question:'What DDoS protection?', question_ar:'إيه حماية DDoS؟', answer:'Basic DDoS Protection included.', answer_ar:'Basic DDoS Protection مجانية.', active:true}
    ];

    const categories = {
      general: { name: 'سؤال عام', icon: '🏠' },
      billing: { name: 'الفوترة والدفع', icon: '💳' },
      technical: { name: 'إدارة السيرفر', icon: '🔧' },
      security: { name: 'الأمان والحماية', icon: '🔒' }
    };

    function renderFAQs() {
      const grouped = {};
      faqs.filter(f => f.active).forEach(faq => {
        if (!grouped[faq.category]) grouped[faq.category] = [];
        grouped[faq.category].push(faq);
      });

      const grid = document.getElementById('faqGrid');
      grid.innerHTML = Object.keys(grouped).map((cat, i) => {
        const catInfo = categories[cat] || { name: cat, icon: '📁' };
        return `
          <div class="faq-card" data-category="${cat}" style="animation-delay:${i*.1}s">
            <div class="faq-header">
              <span class="faq-icon">${catInfo.icon}</span>
              <span class="faq-cat-title">${catInfo.name}</span>
            </div>
            <div class="faq-list">
              ${grouped[cat].map(faq => `
                <div class="faq-item" onclick="this.classList.toggle('open')">
                  <div class="faq-q">${faq.question_ar || faq.question}<span class="faq-toggle">+</span></div>
                  <div class="faq-a">${faq.answer_ar || faq.answer}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function showCategory(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.faq-card').forEach(card => {
        card.style.display = (cat === 'all' || card.dataset.category === cat) ? 'block' : 'none';
      });
    }

    function filterFAQs() {
      const search = document.getElementById('faqSearch').value.toLowerCase();
      document.querySelectorAll('.faq-item').forEach(item => {
        const q = item.querySelector('.faq-q').textContent.toLowerCase();
        const a = item.querySelector('.faq-a').textContent.toLowerCase();
        item.style.display = (q.includes(search) || a.includes(search)) ? 'block' : 'none';
      });
    }

    renderFAQs();
  </script>
</body>
</html>
